services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel_ai
    volumes:
      - sentinel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    environment:
      # Overrides .env.production's values so the backend reaches Postgres/
      # Redis by their compose service name, not localhost.
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel_ai
      REDIS_URL: redis://redis:6379/0
    volumes:
      # Gives DockerMonitoringService control of the HOST's Docker daemon
      # (sibling containers, including this one) - see CLAUDE.md's Docker
      # monitoring section: Sentinel is designed to run on the same single
      # host as everything it watches, never a remote Docker/K8s target.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sentinel_postgres_data:
